name: App Builder
on:
    workflow_dispatch:
    push:
        tags:
            - 'v*'

env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    RUST_TOOLCHAIN_VERSION: 1.93.0

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
permissions:
    contents: write

jobs:
    publish-tauri:
        permissions:
          contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
#                  - platform: 'macos-latest'
#                    args: '--target aarch64-apple-darwin'
#                  - platform: 'macos-latest'
#                    args: '--target x86_64-apple-darwin'
                  - platform: 'ubuntu-22.04'
                    args: ''
                  - platform: 'windows-latest'
                    args: ''
        runs-on: ${{ matrix.platform }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ env.GITHUB_TOKEN }}

            - name: Node.js setup (25.x)
              uses: actions/setup-node@v4
              with:
                  node-version: 25.x

            - name: install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
                targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

            - name: Install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libudev-dev javascriptcoregtk-4.1 libsoup-3.0 libwebkit2gtk-4.0-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev webkit2gtk-4.0 patchelf libsoup2.4-dev
                  npm install -g pnpm
                  npm install -g typescript

            - name: install dependencies (windows only)
              if: matrix.platform == 'windows-latest'
              run: |
                  npm install -g typescript
                  npm install -g pnpm

            - name: install dependencies (macos only)
              if: matrix.platform == 'macos-latest'
              run: |
                  brew install pnpm

            - name: Install frontend dependencies (PNPM)
              run: pnpm install --no-frozen-lockfile

            - name: Generate Local Plugins  (PNPM)
              run: pnpm run specta:gen

            - uses: tauri-apps/tauri-action@v0.6.1
              id: tauri_build
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
                TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
              with:
                  tagName: v__VERSION__
                  releaseName: 'ETVR-Firmware-Flashing-tool v__VERSION__'
                  generateReleaseNotes: true
                  includeUpdaterJson: true
                  prerelease:  ${{ contains(github.ref_name, 'beta') }}
                  args: ${{ matrix.args }}
